services:
  - type: web
    name: litecord-signaling
    env: node
    region: singapore        # closest Render free region to South Asia
    plan: free
    # No rootDir — npm install must run from the repo root so the npm workspace
    # can resolve @litecordchat/shared. rootDir: server would break that.
    buildCommand: npm install && npm run build:server
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random secret
      - key: PORT
        value: 10000         # Render's default assigned port
