services:
  - type: web
    name: litecord-signaling
    env: node
    region: singapore        # closest Render free region to South Asia
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random secret
      - key: PORT
        value: 10000         # Render's default assigned port
